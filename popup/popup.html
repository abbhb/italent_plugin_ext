<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iTalent 考勤工时计算器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }
    .header {
      background: #0071ce;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 24px; }
    .header-text h1 { font-size: 14px; font-weight: 600; }
    .header-text p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .content { padding: 16px; }
    .step {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: flex-start;
    }
    .step-num {
      width: 22px; height: 22px;
      background: #0071ce;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .step-desc { font-size: 13px; color: #555; line-height: 1.5; }
    .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
    .tip {
      background: #f0f6ff;
      border: 1px solid #d0e4f8;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #555;
      line-height: 1.6;
    }
    .tip strong { color: #0071ce; }
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #bbb;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">📊</div>
    <div class="header-text">
      <h1>iTalent 考勤工时计算器</h1>
      <p>北森 SaaS 考勤增强插件</p>
    </div>
  </div>
  <div class="content">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-desc">打开 iTalent「我的出勤」页面</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-desc">勾选想要统计的考勤记录行（可多选）</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-desc">点击表格工具栏中的 <strong>「📊 计算工时」</strong> 按钮</div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-desc">在弹窗中查看总工时、加班工时、缺勤统计等信息</div>
    </div>
    <hr class="divider" />
    <div class="tip">
      <strong>加班计算规则：</strong><br />
      工作日超出 8 小时/天的部分计为加班；<br />
      周末（星期六/日）出勤全部计为加班。
    </div>
  </div>
  <div class="footer">v1.0.0 · 仅在 italent.cn 域名生效</div>
</body>
</html>
